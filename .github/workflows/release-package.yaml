name: Release Package

on:
  push:
    tags:
      - "v*"

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and Publish
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    environment: release
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up uv
        uses: astral-sh/setup-uv@v4

      - name: Determine version
        id: parse
        shell: bash
        env:
          TAG_REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          tag="${TAG_REF_NAME:-}"
          if [[ "$tag" =~ ^v([0-9]+\.[0-9]+\.[0-9]+.*)$ ]]; then
            version="${BASH_REMATCH[1]}"
          else
            echo "Invalid tag format; expected vX.Y.Z" >&2
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Cache UV
        uses: actions/cache@v4
        with:
          path: /home/runner/.cache/uv
          key: uv-${{ runner.os }}-hash-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-

      - name: Build sdist + wheel
        run: |
          rm -rf dist/
          uv version ${{ steps.parse.outputs.version }} --no-sync
          uv build --sdist --wheel

      - name: Smoke install built wheel
        run: |
          uv run --with ./dist/*.whl --no-project -- uv pip check

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@71fee32a0bb7e97b4d33d548e7d957010649d8fa # v2.1.3
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT_EMAIL }}
          token_format: access_token
          access_token_lifetime: 3600s

      - name: Publish artifacts with Twine
        env:
          UV_PUBLISH_USERNAME: "oauth2accesstoken"
          UV_PUBLISH_PASSWORD: ${{ steps.auth.outputs.access_token }}
        run: |
          uv publish --index jbr-fed-python ./dist/* --verbose
